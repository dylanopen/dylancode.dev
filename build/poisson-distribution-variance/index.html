<h1>Poission distribution variance</h1>
<p>The <em>variance</em> of a Poisson distribution is equal to its mean - usually written as <im>\lambda</im> - that’s it!</p>
<blockquote>
<p><ma>
\sigma^2 = \lambda
</ma></p>
</blockquote>
