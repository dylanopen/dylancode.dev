<h1>OR gate</h1>
<p>An <em>OR gate</em> takes two input signals and produces an output signal that is <code>1</code>
if <strong>at least one</strong> of the input signals is <code>1</code>.</p>
<p>In other words, as long as they are <em>not</em> both <code>0</code>, the output will be <code>1</code>.</p>
<h2>Truth table</h2>
<table><thead><tr><th>Input A</th><th>Input B</th><th>Output (A OR B)</th></tr></thead><tbody>
<tr><td>0</td><td>0</td><td><strong>0</strong></td></tr>
<tr><td>0</td><td>1</td><td><strong>1</strong></td></tr>
<tr><td>1</td><td>0</td><td><strong>1</strong></td></tr>
<tr><td>1</td><td>1</td><td><strong>1</strong></td></tr>
</tbody></table>

</div></div></body></html>
