<h1>Periodic sequence</h1>
<p>A <em>periodic</em> <a href="/sequence">sequence</a> has a repeating sequence: the sequence <em>repeats</em> over the same terms forever.</p>
<p>We call the the length of the repeating terms the <a href="/sequence-period">period</a> of the sequence.</p>
