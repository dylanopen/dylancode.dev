<h1>Position vectors</h1>
<p>A <em>position vector</em> shows the <em>displacement</em> to the endpoint from the origin.</p>
<p>For example, the position vector of <im>\vec{a}</im> is
<im>\vec{a} = \begin{pmatrix} a_1 \\ a_2 \\ a_3 \end{pmatrix}</im>,
where <im>a_1</im>, <im>a_2</im>, and <im>a_3</im> are the coordinates of the endpoint
of the vector <im>\vec{a}</im>.</p>
