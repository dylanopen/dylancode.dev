<h1>Power of 1</h1>
<p>Anything raised to the power of 1 is itself:</p>
<p><ma>
a^1=a
</ma></p>
<h3>Example: evaluate <im>17^1</im></h3>
<ul>
<li><im>17</im></li>
</ul>
<h3>Example: solve for <im>x</im>: <im>x^1=12</im></h3>
<ul>
<li><im>x=12</im></li>
</ul>
<h3>Example: solve for <im>n</im>: <im>k^n=k</im></h3>
<ul>
<li>Anything to the power of <im>1</im> is itself…</li>
<li>so <im>n=1</im></li>
</ul>
