		<h1>Continuous random expectation transformation</h1>
<p>For a <a href="/continuous-random-variable">continuous random variable</a>, if the <a href="/probability-density-function">probability density function</a> is <im>f(x)</im> and the transformation function is <im>t(x)</im>:</p>
<blockquote>
<p><ma>
E(g(X))=\int_a^b\,t(x)\times f(x)\,\,dx
</ma></p>
</blockquote>
