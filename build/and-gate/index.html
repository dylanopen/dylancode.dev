<h1>AND gate</h1>
<p>An <em>AND gate</em> takes two input signals and produces an output signal that is
<code>1</code> ONLY if <strong>both</strong> input signals are <code>1</code>.</p>
<h2>Truth table</h2>
<table><thead><tr><th>Input A</th><th>Input B</th><th>Output (A AND B)</th></tr></thead><tbody>
<tr><td>0</td><td>0</td><td><strong>0</strong></td></tr>
<tr><td>0</td><td>1</td><td><strong>0</strong></td></tr>
<tr><td>1</td><td>0</td><td><strong>0</strong></td></tr>
<tr><td>1</td><td>1</td><td><strong>1</strong></td></tr>
</tbody></table>

</div></div></body></html>
