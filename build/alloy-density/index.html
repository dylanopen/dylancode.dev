<h1>Alloy density</h1>
<ul>
<li>An <a href="/alloy">alloy</a> is a mix of two or more metals.</li>
<li>We usually write it as a <em>percentage by volume</em> of each metal.</li>
<li>The total mass is the <a href="/mass">mass</a> of each part of the alloy, added together.</li>
<li>The total volume is the <a href="/volume">volume</a> of each part of the alloy, added together.</li>
</ul>
