		<h1>Processor registers</h1>
<p>There are lots of different <a href="/register">registers</a> in the <a href="/processor">processor</a>, but the main 6 are the:</p>
<ul>
<li><a href="/program-counter">Program counter</a> (PC)</li>
<li><a href="/current-instruction-register">Current instruction register</a> (CIR)</li>
<li><a href="/memory-address-register">Memory address register</a> (MAR)</li>
<li><a href="/memory-buffer-register">Memory buffer register</a> (MBR)</li>
<li><a href="/status-register">Status register</a></li>
<li><a href="/accumulator">Accumulator</a></li>
</ul>
