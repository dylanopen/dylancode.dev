<h1>Binomial distribution notation</h1>
<p>We can write the binomial distribution as:</p>
<blockquote>
<p><ma>
X\sim B(n,p)
</ma></p>
</blockquote>
<ul>
<li><im>n</im> is the number of trials</li>
<li><im>p</im> is the probability of success</li>
<li><im>X</im> is the number of successes achieved in <im>n</im> trials</li>
<li><im>B</im> means that the <a href="/binomial-distribution">distribution is binomial</a></li>
</ul>

</div></div></body></html>
