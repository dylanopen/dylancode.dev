<h1>Double slit diffraction</h1>
<p><ma>
w=\frac{\lambda D}s
</ma></p>
<p>Where:</p>
<ul>
<li><im>w</im> is the distance between the fringes (diffracted peaks)</li>
<li><im>\lambda</im> is the wavelength</li>
<li><im>D</im> is the distance from the screen with the gratings to the projected screen</li>
<li><im>s</im> is the distance between the slits (gratings)</li>
</ul>
