<h1>Electrical power</h1>
<h2>Calculating power</h2>
<p>There are loads of different ways we can calculate the power:</p>
<p><ma>
P=\frac{\Delta E}{\Delta t}
</ma></p>
<p><ma>
P=IV
</ma></p>
<p><ma>
P=I^2R
</ma></p>
<p><ma>
P=\frac{V^2}{R}
</ma></p>
