<h1>Specific latent heat of fusion</h1>
<p>The <a href="/specific-latent-heat">specific latent heat</a> of <a href="/fusion">fusion</a> is the amount of <a href="/thermal-energy">thermal energy</a> required to melt <im>1kg</im> a <a href="/solid">solid</a> into a <a href="/liquid">liquid</a>.</p>
