		<h1>Graph edge</h1>
<p>An <strong>edge</strong> of a graph connects two <a href="/graph-node">nodes</a> together.</p>
<p>Edges can have a <em>direction</em> if they are on a <a href="/directed-graph">directed graph</a>,
as directed edges can only be traversed in one direction.</p>
<p>If they’re on a <a href="/network">network</a>, edges can also have a <em>weight</em>. Edges on a
network are known as <a href="/network-arc">arcs</a>.</p>
