<h1>Weak nuclear force</h1>
<p>The <em>weak nuclear force</em> is one of the <a href="/particle-forces">particle forces</a>.</p>
<blockquote>
<p>The weak force manages <a href="/radioactive-decay">radioactive decay</a>.</p>
</blockquote>
<h2>Range</h2>
<ul>
<li>The weak nuclear <a href="/force">force</a> has the <em>shortest <a href="/range">range</a></em> of all the <a href="/particle-forces">particle forces</a>.</li>
<li>Its <a href="/range">range</a> is about <im>1\times10^{18}\,m</im>.</li>
</ul>
