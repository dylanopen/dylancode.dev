		<h1>Graph trail</h1>
<p>A <strong>trail</strong> is just like a <a href="/graph-walk">walk</a> in a <a href="/graph">graph</a>, except that
you are not allowed to traverse the same <a href="/graph-edge">edge</a> more than once.</p>
<h2>Visiting vertices and edges</h2>
<ul>
<li>You can visit the same <a href="/graph-vertex">vertex</a> multiple times in a trail.</li>
<li>However, you cannot traverse the same <a href="/graph-edge">edge</a> more than once.</li>
</ul>
