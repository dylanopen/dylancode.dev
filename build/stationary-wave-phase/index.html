		<h1>Stationary wave phase</h1>
<p>In a <a href="/stationary-wave">stationary wave</a>, the particles between the <a href="/wave-node">nodes</a> vibrate <strong>in phase</strong> with each other.</p>
<p>That means when one is going up, the other is going up, or when one is going down, the other is going down.</p>
