<h1>Parametric line equation</h1>
<p>A <em>parametric</em> <a href="/equation-of-a-straight-line">line equation</a> represents a line in terms of its <im>x</im> and <im>y</im> components at each <em>angle</em>.</p>
<p>For example, this is a parametric line equation:</p>
<ul>
<li><im>x=\cos\theta,\,\,y=\sin\theta</im></li>
</ul>
