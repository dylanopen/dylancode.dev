<h1>Antimatter</h1>
<p><em>Antimatter</em> is effectively the opposite of <a href="/matter">matter</a>. It’s made up of <a href="/antiparticle">antiparticle</a>s instead of <a href="/particle">particle</a>s, and it’s basically just a group of antiparticles that are bound together in some way.</p>
<p>When antimatter and matter meet, they <a href="/annihilation">annihilate</a> each other, producing two <a href="/photon">photon</a>s.</p>
