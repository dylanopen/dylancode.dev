		<h1>Finding the equation of a tangent using differentiation</h1>
<h3>Example: The derivative of a curve at point <im>(4, -2)</im> is <im>5</im> - find the equation of the tangent</h3>
<ul>
<li>Gradient = <im>5</im>.</li>
<li>X-offset = <im>4</im></li>
<li>Y-offset = <im>-2</im></li>
<li><im>(y--2)=5(x-4)</im></li>
<li><im>y+2=5x-20</im></li>
<li><im>y=5x-22</im></li>
</ul>
