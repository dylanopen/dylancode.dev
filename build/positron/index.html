<h1>Positron</h1>
<p>A <em>positron</em> is the <a href="/antiparticle">antiparticle</a> of an <a href="/electron">electron</a>.</p>
<p>That means it has:</p>
<ul>
<li>the same <a href="/mass">mass</a> as an electron</li>
<li>the opposite <a href="/charge">charge</a> of an electron (positive)</li>
</ul>
<p>When a positron meets an electron, they <a href="/annihilation">annihilate</a> each other, producing two <a href="/photon">photon</a>s.</p>
