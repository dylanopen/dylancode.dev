<h1>MIDI disadvantages</h1>
<p>The main disadvantage with <a href="/midi">mIDI</a> is that it can’t record things that aren’t digital instruments.</p>
<p>You can’t record a MIDI file of an acoustic guitar, or of singing, for example.</p>
