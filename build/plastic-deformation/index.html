<h1>Plastic deformation</h1>
<p>Plastic <a href="/deformation">deformation</a> is when an object’s shape is permanently changed.</p>
<p>After the <a href="/force">force</a> (<a href="/tension">tension</a> or <a href="/compression">compression</a>) that deformed it is removed, it does not return to its original shape (it’s permanently deformed).</p>
