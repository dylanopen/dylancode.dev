<h1>Refractive index of air</h1>
<p>The refractive index of <em>air</em> is <em>about</em> <im>1</im> - the same as the <a href="/refractive-index-of-a-vacuum">refractive index of a vacuum</a>.</p>
<p>That means light travels at roughly the same speed through air as it does
through a vacuum.</p>
