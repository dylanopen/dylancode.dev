<h1>Electromagnetic wave</h1>
<p>An <strong>electromagnetic wave</strong> is a type of <a href="/transverse-wave">transverse wave</a>.</p>
<h2>Speed</h2>
<p><strong>All</strong> electromagnetic waves travel at the same speed in a vacuum: the speed of
light, which is about <im>3.00\times10^8</im> meters per second (<im>m/s</im>).</p>
