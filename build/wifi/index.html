<h1>WiFi</h1>
<blockquote>
<p>WiFi is a <a href="/local-area-network">local area network</a> protocol used to enable devices to connect to a network wirelessly.</p>
</blockquote>
<p>What that means is that we created a standard <a href="/network-protocol">protocol</a> to allow devices to connect to a network without cables - you’ve probably used Wifi before!</p>
