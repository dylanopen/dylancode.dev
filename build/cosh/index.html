<h1>cosh</h1>
<p><im>\cosh</im>, or <strong>hyperbolic cosine</strong>, is defined like this:</p>
<p><ma>
\cosh x=\frac{e^x+e^{-x}}2
</ma></p>
<blockquote>
<p>It’s pronounced ‘cosh’ - as it’s spelt.</p>
</blockquote>
<h2>Finding from <im>\tanh</im></h2>
<p>Using the definition for <im>\tanh</im>:</p>
<p><ma>
\tanh=\frac{\sinh}{\cosh}
</ma></p>
<p>…we can deduce that:</p>
<p><ma>
\cosh=\frac{\sinh}{\tanh}
</ma></p>
