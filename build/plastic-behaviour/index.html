<h1>Plastic behaviour</h1>
<p>If a material has plastic behaviour, it means it undergoes <a href="/plastic-deformation">plastic deformation</a>, usually after the <a href="/limit-of-proportionality">limit of proportionality</a> has been reached.</p>
<p>It doesn’t go back to its original shape when the force is removed.</p>
