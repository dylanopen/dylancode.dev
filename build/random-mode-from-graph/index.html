<h1>Random mode from graph</h1>
<p>If we have a <a href="/random-variable">random variable</a> and want to find its <a href="/mode">mode</a>:</p>
<blockquote>
<p>The mode is just the y-coordinate (probability) of the <strong>highest point</strong> (maximum) of the <a href="/probability-density-function">probability density function</a>’s graph.</p>
</blockquote>
