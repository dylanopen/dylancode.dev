<h1>Simple graph</h1>
<p>A simple graph is a type of <a href="/graph">graph</a> which has no <a href="/graph-loop">loops</a> or
multiple <a href="/graph-edge">edges</a> between the same pair of
<a href="/graph-vertex">vertices</a>.</p>
<blockquote>
<p><strong>Simple graph</strong>: a graph without loops or multiple edges between the same
pair of vertices.</p>
