<h1>Divergent sequence</h1>
<p>A <em>divergent</em> <a href="/sequence">sequence</a> is the <strong>opposite</strong> of a <a href="/convergent-sequence">convergent sequence</a>.</p>
<p>It does not ever converge into a limit.</p>
