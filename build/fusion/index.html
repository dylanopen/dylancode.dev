<h1>Fusion</h1>
<p><strong>Fusion</strong> is when a <strong>state change</strong> occurs, involving a <a href="/solid">solid</a> turning into a <a href="/liquid">liquid</a>, or a <a href="/liquid">liquid</a> turning into a <a href="/solid">solid</a>.</p>
<p>The <a href="/specific-latent-heat-of-fusion">specific latent heat of fusion</a> is the <a href="/specific-latent-heat">specific latent heat</a> for a state change between solid and liquid.</p>
