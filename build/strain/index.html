<ul>
<li><em>Strain</em> is the ratio of the <em>change in length</em> (extension) to the <em>original length</em>.</li>
</ul>
<h2>Strain equation</h2>
<blockquote>
<p><ma>
\epsilon=\frac{\Delta L}L
</ma></p>
