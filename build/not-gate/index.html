<h1>NOT gate</h1>
<p>A <em>NOT gate</em> takes a single input signal and produces an output signal that is
the <strong>opposite</strong> of the input signal.</p>
<h2>Truth table</h2>
<table><thead><tr><th>Input A</th><th>Output (NOT A)</th></tr></thead><tbody>
<tr><td>0</td><td><strong>1</strong></td></tr>
<tr><td>1</td><td><strong>0</strong></td></tr>
</tbody></table>
