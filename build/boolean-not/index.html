<h1>Boolean NOT</h1>
<p>To represent a <a href="/not-gate">NOT gate</a> of <code>A</code> (in other words, invert the value of <code>A</code>), we
put a line on top of the expression we want to invert:</p>
<p><ma>
\overline A
</ma></p>
<p>Or, for a longer expression (inverting <im>A+B\cdot C</im>):</p>
<p><ma>
\overline{A+B\cdot C}\oplus D
</ma></p>
