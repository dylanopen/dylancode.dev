<h1>Type 2 hypothesis error</h1>
<blockquote>
<p>In a <em>type two</em> hypothesis error, we have a <a href="/false-negative">false negative</a> - we state that we <strong>do not</strong> have sufficient evidence to reject the <a href="/null-hypothesis">null hypothesis</a>, but actually, the <a href="/alternative-hypothesis">alternative hypothesis</a> is ‘true’.</p>
