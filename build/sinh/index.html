<h1>sinh</h1>
<p><im>\sinh</im>, or <strong>hyperbolic sine</strong>, is defined like this:</p>
<p><ma>
\sinh x=\frac{e^x-e^{-x}}2
</ma></p>
<blockquote>
<p>It’s pronounced ‘shine’ or ‘cinch’.</p>
</blockquote>
<h2>Finding from <im>\tanh</im></h2>
<p>Using the definition for <im>\tanh</im>:</p>
<p><ma>
\tanh=\frac{\sinh}{\cosh}
</ma></p>
<p>…we can deduce that:</p>
<p><ma>
\sinh=\cosh\cdot\tanh
</ma></p>
