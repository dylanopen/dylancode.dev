<h1>Ductile</h1>
<p>If a <a href="/material">material</a> is <strong>ductile</strong>, it means it can easily be drawn out into a <a href="/wire">wire</a> without <a href="/fracture">fracturing</a> (breaking).</p>
<p><a href="/copper">copper</a> is an example of a ductile material, so it’s often used in electronics.</p>
