<h1>Boolean XOR</h1>
<p>To represent an <a href="/xor-gate">XOR gate</a> between <code>A</code> and <code>B</code>, we use the <im>\oplus</im>
operator:</p>
<p><ma>
A\oplus B
</ma></p>
<h2><a href="/flashcards">flashcards</a></h2>
<table><thead><tr><th>Question</th><th>Answer</th></tr></thead><tbody>
<tr><td>A xor B is represented by which operator?</td><td><im>A\oplus B</im></td></tr>
<tr><td>What is the logical meaning of <im>A \oplus B</im>?</td><td>It represents the Boolean XOR (exclusive OR) gate between A and B.</td></tr>
</tbody></table>
