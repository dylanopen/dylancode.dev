<h1>Absolute zero</h1>
<p>Absolute zero is the <a href="/temperature">temperature</a> of a substance when it has <strong>zero</strong> <a href="/kinetic-energy">kinetic energy</a>.</p>
<p>This is at <im>0K</im>  (<a href="/kelvin">kelvin</a>), and <im>-273^\circ C</im> (<a href="/degree-celsius">degree celsius</a>)</p>
