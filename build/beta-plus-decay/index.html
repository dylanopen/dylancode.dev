<h1>Beta plus decay</h1>
<p>In <a href="/beta-minus">beta-minus</a> decay, beta minus <a href="/radiation">radiation</a> is emitted from the <a href="/nucleus">nucleus</a>, and it has the equation:</p>
<blockquote>
<p><ma>
^A_ZX\,\rightarrow\,\,^A_{Z-1}Y\,\,+\,\,^0_{+1}\beta\,\,+\,\,\nu_e
</ma></p>
</blockquote>
<ul>
<li><im>^0_{+1}e</im> is a <a href="/positron">positron</a> - it’s a positive electron.</li>
</ul>
