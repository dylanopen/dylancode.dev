<h1>Continuous random variance</h1>
<p>When we calculate the <a href="/variance">variance</a> of a <a href="/continuous-random-variable">continuous random variable</a>, it’s exactly the same as <a href="/discrete-random-variance">calculating the variance</a> of a <a href="/discrete-random-variable">discrete random variable</a>.</p>
<blockquote>
<p><ma>
Var(X)=E(X^2)-E(X)^2
</ma></p>
</blockquote>
<p>To find <im>E(X^2)</im>, see <a href="/continuous-random-square-expectation">continuous random square expectation</a>.</p>
