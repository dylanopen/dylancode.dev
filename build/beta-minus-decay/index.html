<h1>Beta minus decay</h1>
<p>In beta minus <a href="/radioactive-decay">radioactive decay</a>, <a href="/beta-minus">beta-minus</a> <a href="/radiation">radiation</a> is emitted from the <a href="/nucleus">nucleus</a>, and it has the equation:</p>
<blockquote>
<p><ma>
^A_ZX\,\rightarrow\,\,^A_{Z+1}Y\,\,+\,\,^0_{-1}\beta\,\,+\,\,\overline\nu_e
</ma></p>
</blockquote>
<ul>
<li><im>^0_{-1}\beta</im> is a fast-moving <a href="/electron">electron</a>.</li>
</ul>
