<h1>Antiparticle</h1>
<p>A <a href="/particle">particle</a> and <em>antiparticle</em> pair have the same <a href="/mass">mass</a> but opposite <a href="/charge">charge</a>s.</p>
<p>When a particle meets its antiparticle, they <a href="/annihilation">annihilate</a> each other, producing two <a href="/photon">photon</a>s.</p>
