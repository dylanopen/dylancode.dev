<h1>Logarithm graph equation</h1>
<p>If we have an <em>exponential</em> graph with this equation:</p>
<p><ma>
N=Ae^{kt}
</ma></p>
<p>we can rewrite this as:</p>
<p><ma>
\ln N = \ln A + kt
</ma></p>
<p>We can then <em>plot</em> this data on a graph with a <em>logarithmic</em> scale on the
<strong>y-axis</strong>.</p>
