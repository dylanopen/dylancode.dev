<h1>Decreasing sequence</h1>
<p>For any decreasing <a href="/sequence">sequence</a>, it is <strong>always</strong> true that:</p>
<blockquote>
<p><im>u_{n+1}&lt;u_n</im></p>
</blockquote>
<p>Where:</p>
<ul>
<li><im>u_n</im> is a term in the sequence</li>
<li>$u_{n+1} is the term in the sequence <strong>after</strong> <im>u_n</im></li>
</ul>

</div></div></body></html>
