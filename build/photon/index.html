<h1>Photon</h1>
<p>A <em>photon</em> is effectively a ‘bundle of energy’. It makes up any of the <a href="/electromagnetic-spectrum">electromagnetic waves</a>.</p>
<p>It carries energy based on its frequency, and it’s the way that EM waves are able to transfer energy from one place to another.</p>
